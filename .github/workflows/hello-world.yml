name: hello-world

on:
  workflow_dispatch:
    inputs:
      input:
        type: choice
        options:
        - success
        - fail

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Test
        shell: bash
        run: |
          if [[ ${{ inputs.input }} == "success" ]]; then
            exit 0
          else
            exit 1
          fi
