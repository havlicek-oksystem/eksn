name: hello-world

on:
  push:
    branches:
      - 'main'
      
  workflow_dispatch:
    inputs:
      input:
        description: "Název API, které se má publikovat"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Test
        id: test
        if: github.event_name == 'push'
        shell: bash
        run: |
          variada="test1 test2 test3"
          echo "var1=$variada" >> $GITHUB_OUTPUT

      - name: Test2
        shell: bash
        run: |
          echo "Vypis: ${{ inputs.input || steps.test.outputs.var1 }}"
